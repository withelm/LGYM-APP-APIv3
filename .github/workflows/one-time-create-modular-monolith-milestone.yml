name: One-time create modular monolith milestone

on:
  push:
    branches:
      - automation/modular-monolith-milestone

permissions:
  contents: read
  issues: write

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Create milestone and assign architecture issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Modular Monolith & Domain Boundaries';
            const description = [
              'Incremental migration of LGYM API to a modular monolith with bounded contexts and vertical use-case slices.',
              '',
              'Non-negotiable persistence constraint: one existing PostgreSQL database, one production AppDbContext, one schema model, and one EF Core migration stream.',
              '',
              'Tracks epic #311 and implementation issues #375-#395.'
            ].join('\n');

            const milestones = await github.paginate(
              github.rest.issues.listMilestones,
              { owner, repo, state: 'all', per_page: 100 }
            );

            let milestone = milestones.find(item => item.title === title);

            if (!milestone) {
              const created = await github.rest.issues.createMilestone({
                owner,
                repo,
                title,
                description,
                state: 'open'
              });
              milestone = created.data;
            } else {
              const updated = await github.rest.issues.updateMilestone({
                owner,
                repo,
                milestone_number: milestone.number,
                title,
                description,
                state: 'open'
              });
              milestone = updated.data;
            }

            const issueNumbers = [
              311,
              ...Array.from({ length: 21 }, (_, index) => 375 + index)
            ];

            for (const issue_number of issueNumbers) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                milestone: milestone.number
              });
            }

            core.notice(`Milestone #${milestone.number} '${title}' assigned to ${issueNumbers.length} issues.`);
            await core.summary
              .addHeading('Milestone created and assigned')
              .addRaw(`Milestone #${milestone.number}: ${title}\n\n`)
              .addRaw(`Assigned issues: ${issueNumbers.join(', ')}\n`)
              .write();
