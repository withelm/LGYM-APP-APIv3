name: PR and Main Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  checks: write

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.102

      - name: Restore
        run: dotnet restore LgymApi.sln

      - name: Build
        run: dotnet build LgymApi.sln --configuration Release --no-restore

      - name: Verify nullable warnings gate (gated projects)
        run: |
          dotnet build LgymApi.Domain/LgymApi.Domain.csproj --configuration Release --no-restore
          dotnet build LgymApi.BackgroundWorker.Common/LgymApi.BackgroundWorker.Common.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test LgymApi.UnitTests/LgymApi.UnitTests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --results-directory ./TestResults/Unit

      - name: Run architecture tests
        run: dotnet test LgymApi.ArchitectureTests/LgymApi.ArchitectureTests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=architecture-tests.trx" --results-directory ./TestResults/Architecture

      - name: Run InMemory integration tests
        run: dotnet test LgymApi.IntegrationTests/LgymApi.IntegrationTests.csproj --configuration Release --no-build --filter "TestCategory!=PostgreSql" --verbosity normal --logger "trx;LogFileName=inmemory-integration-tests.trx" --results-directory ./TestResults/Integration

      - name: Run PostgreSQL integration tests
        env:
          LGYM_CI_POSTGRES_ADMIN: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres;Pooling=false;Timeout=5;Command Timeout=30
        run: pwsh -File scripts/run-postgresql-integration-tests.ps1 -ConnectionString "$env:LGYM_CI_POSTGRES_ADMIN" -ResultsDirectory ./TestResults/PostgreSql -NoBuild

      - name: Run DataSeeder tests
        run: dotnet test LgymApi.DataSeeder.Tests/LgymApi.DataSeeder.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=dataseeder-tests.trx" --results-directory ./TestResults/DataSeeder

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload PostgreSQL integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-integration-test-reports-${{ github.run_number }}
          path: TestResults/PostgreSql/**/*.trx
          if-no-files-found: warn

      - name: Publish unit test summary
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: TestResults/Unit/*.trx
          reporter: dotnet-trx

      - name: Publish integration test summary
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: Integration Tests
          path: TestResults/Integration/*.trx
          reporter: dotnet-trx

      - name: Publish PostgreSQL integration test summary
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: PostgreSQL Integration Tests
          path: TestResults/PostgreSql/**/*.trx
          reporter: dotnet-trx

      - name: Publish DataSeeder test summary
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: DataSeeder Tests
          path: TestResults/DataSeeder/*.trx
          reporter: dotnet-trx

      - name: Publish architecture test summary
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: Architecture Tests
          path: TestResults/Architecture/*.trx
          reporter: dotnet-trx
