services:
  logpanel-proxy:
    image: nginx:1.27-alpine
    depends_on:
      kibana:
        condition: service_healthy
    environment:
      DEMO_BASIC_AUTH_USER: ${DEMO_BASIC_AUTH_USER:-admin}
      DEMO_BASIC_AUTH_PASSWORD: ${DEMO_BASIC_AUTH_PASSWORD:-admin12345}
      DEMO_TLS_CN: ${DEMO_TLS_CN:-127.0.0.1}
    ports:
      - "127.0.0.1:8081:80"
      - "127.0.0.1:8443:443"
    volumes:
      - ./deploy/nginx/log.local-demo.conf:/etc/nginx/conf.d/default.conf:ro
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache apache2-utils openssl
        mkdir -p /demo
        htpasswd -bc /demo/.htpasswd "$${DEMO_BASIC_AUTH_USER}" "$${DEMO_BASIC_AUTH_PASSWORD}"
        openssl req -x509 -nodes -newkey rsa:2048 \
          -keyout /demo/tls.key \
          -out /demo/tls.crt \
          -days 365 \
          -subj "/CN=$${DEMO_TLS_CN}"
        cat <<'EOF' >/demo/index.html
        <!doctype html>
        <html>
        <head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=/app/home">
          <title>LGYM Log Panel Demo</title>
        </head>
        <body>
          <p>Authenticated. Opening Kibana demo...</p>
          <p><a href="/app/home">Continue to Kibana</a></p>
        </body>
        </html>
        EOF
        exec nginx -g 'daemon off;'
    healthcheck:
      test:
        - CMD-SHELL
        - test -s /demo/.htpasswd -a -s /demo/tls.crt -a -s /demo/tls.key && nginx -t
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - logging
    restart: unless-stopped
