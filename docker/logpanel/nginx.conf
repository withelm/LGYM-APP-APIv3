# lgym-logpanel nginx auth gate.
# Reuses the production pattern from deploy/nginx/log.lgym.ovh.conf
# (OIDC-first login + explicit admin-only break-glass basic-auth route
# + rate limiting + TLS + proxy to Kibana), adapted to localhost:5601 and
# port 8443.

user www-data;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout 65;

    # Rate-limit zone keyed by client IP: 10 requests/sec, burst 20.
    # (Must live inside http; the reference file is included inside http too.)
    limit_req_zone $binary_remote_addr zone=logpanel:10m rate=10r/s;

    # HTTP :8080 -> redirect everything to HTTPS :8443.
    server {
        listen 8080;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    # HTTPS :8443 -> Kibana login surface (localhost:5601).
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/tls.crt;
        ssl_certificate_key /etc/nginx/tls.key;

        add_header Strict-Transport-Security "max-age=31536000" always;

        # Separate admin-only recovery path that still requires nginx basic auth
        # before deep-linking to Kibana's native basic provider.
        location = /admin-login {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            return 302 https://$host:8443/login?auth_provider_hint=basic1;
        }

        # Rate limit only login/auth entrypoints. Applying it to the whole
        # protected server breaks Kibana SPA/plugin asset bursts after login.
        location = /internal/security/login {
            limit_req zone=logpanel burst=20 nodelay;
            proxy_pass http://localhost:5601;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 8443;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        location = /api/security/v1/login {
            limit_req zone=logpanel burst=20 nodelay;
            proxy_pass http://localhost:5601;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 8443;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://localhost:5601;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 8443;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
