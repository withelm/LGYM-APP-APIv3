discovery.type: single-node
bootstrap.memory_lock: false
http.host: 0.0.0.0
path.data: /usr/share/elasticsearch/data

xpack.security.enabled: true
xpack.security.authc.token.enabled: true
xpack.security.authc.realms.oidc.google_oidc:
  order: 10
  rp.client_id: "${LOGGING_GOOGLE_OIDC_CLIENT_ID:-__OIDC_DISABLED__}"
  rp.response_type: code
  rp.requested_scopes: ["openid", "email", "profile"]
  rp.redirect_uri: "https://log.lgym.ovh/api/security/oidc/callback"
  rp.post_logout_redirect_uri: "https://log.lgym.ovh/security/logged_out"
  op.issuer: "https://accounts.google.com"
  op.authorization_endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
  op.token_endpoint: "https://oauth2.googleapis.com/token"
  op.userinfo_endpoint: "https://openidconnect.googleapis.com/v1/userinfo"
  op.jwkset_path: "https://www.googleapis.com/oauth2/v3/certs"
  claims.principal: email
  claims.groups: "${LOGGING_GOOGLE_OIDC_GROUPS_CLAIM}"

xpack.security.http.ssl.enabled: true
xpack.security.http.ssl.certificate: /opt/elasticsearch/config/certs/http/tls.crt
xpack.security.http.ssl.key: /opt/elasticsearch/config/certs/http/tls.key
xpack.security.http.ssl.certificate_authorities:
  - /opt/elasticsearch/config/certs/http/ca.crt

xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
xpack.security.transport.ssl.certificate: /opt/elasticsearch/config/certs/transport/tls.crt
xpack.security.transport.ssl.key: /opt/elasticsearch/config/certs/transport/tls.key
xpack.security.transport.ssl.certificate_authorities:
  - /opt/elasticsearch/config/certs/transport/ca.crt
