# Reference nginx auth-gate for log.lgym.ovh (copies onto the external nginx host).
# Kibana is bound to 127.0.0.1:5601 on the host; nginx proxies locally.
# Primary login is Kibana's Google OIDC provider at /login; /admin-login is
# the explicit break-glass route that still uses nginx basic auth.
# On the host: htpasswd -B /etc/nginx/.htpasswd-log.lgym.ovh admin
#             chmod 640 /etc/nginx/.htpasswd-log.lgym.ovh; chown root:www-data ...
#             certbot --nginx -d log.lgym.ovh
#             nginx -s reload
limit_req_zone $binary_remote_addr zone=logpanel:10m rate=10r/s;

server {
    listen 80;
    server_name log.lgym.ovh;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name log.lgym.ovh;
    ssl_certificate     /etc/letsencrypt/live/log.lgym.ovh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/log.lgym.ovh/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = /admin-login {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd-log.lgym.ovh;
        return 302 https://log.lgym.ovh/login?auth_provider_hint=basic1;
    }

    location = /internal/security/login {
        limit_req zone=logpanel burst=20 nodelay;
        proxy_pass http://127.0.0.1:5601;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location = /api/security/v1/login {
        limit_req zone=logpanel burst=20 nodelay;
        proxy_pass http://127.0.0.1:5601;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:5601;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
